<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProLift Log</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --secondary: #94a3b8;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 80px;
        }
        .header {
            padding: 20px;
            background: var(--card);
            border-bottom: 1px solid #334155;
            text-align: center;
        }
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #334155;
        }
        .nav-item {
            color: var(--secondary);
            text-decoration: none;
            font-size: 12px;
            text-align: center;
        }
        .nav-item.active { color: var(--accent); }
        .container { padding: 15px; }
        .exercise-card {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        input {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 8px;
            border-radius: 6px;
            width: 60px;
            margin-right: 5px;
        }
        .btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        canvas { background: var(--card); border-radius: 12px; margin-top: 20px; padding: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h2 id="today-title">Today's Workout</h2>
    <p id="muscle-group" style="color: var(--accent); margin: 0;"></p>
</div>

<div class="container" id="app-content">
    </div>

<div class="nav-bar">
    <a href="#" class="nav-item active" onclick="showLog()">Log</a>
    <a href="#" class="nav-item" onclick="showHistory()">History</a>
    <a href="#" class="nav-item" onclick="showStats()">Stats</a>
</div>

<script>
    // THE WORKOUT DATA
    const schedule = {
        1: { name: "Chest & Triceps", exercises: ["Barbell Bench", "Incline Barbell", "Pec Flys", "Pushdowns", "Skull Crushers"] },
        2: { name: "Back & Biceps", exercises: ["Lat Pulldowns", "Cable Rows", "T-Bar Rows", "Barbell Curls", "Hammer Curls"] },
        3: { name: "Legs", exercises: ["Squat", "Lunges", "Calf Raise", "Leg Press", "Leg Extension"] },
        4: { name: "Back & Chest", exercises: ["Bench Press", "Lat Pulldown", "Incline Press", "Cable Row"] },
        5: { name: "Biceps/Triceps/Shoulder", exercises: ["Shoulder Press", "Lateral Raise", "Spider Curls", "Dips"] },
        6: { name: "Legs", exercises: ["Squat", "Leg Press", "Hamstring Curls"] },
        0: { name: "Rest Day", exercises: [] }
    };

    function showLog() {
        const d = new Date();
        const day = d.getDay();
        const workout = schedule[day];
        document.getElementById('muscle-group').innerText = workout.name;
        
        let html = '';
        workout.exercises.forEach(ex => {
            html += `
            <div class="exercise-card">
                <h4 style="margin: 0 0 10px 0">${ex}</h4>
                <div style="display:flex; justify-content: space-between; color: var(--secondary); font-size: 12px;">
                    <span>Set</span><span>Kg</span><span>Reps</span><span>RPE</span>
                </div>
                ${[1,2,3].map(s => `
                    <div style="margin-top:5px; display:flex; align-items:center; justify-content:space-between;">
                        <span>${s}</span>
                        <input type="number" placeholder="0">
                        <input type="number" placeholder="0">
                        <input type="number" placeholder="10">
                    </div>
                `).join('')}
            </div>`;
        });
        html += '<button class="btn" onclick="save()">Save Workout</button>';
        document.getElementById('app-content').innerHTML = html;
    }

    function save() {
        alert("Workout Saved Locally! (Offline)");
        // Logic to save to localStorage would go here
    }

    // Initialize
    showLog();
</script>
</body>
</html>
