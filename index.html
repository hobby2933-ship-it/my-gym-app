<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProLift Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d0d12;
            --surface: #1c1c28;
            --accent: #00f5d4;
            --purple: #9b5de5;
            --text: #ffffff;
            --dim: #6b7280;
            --input-bg: #222232;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Top Nav from Screenshot */
        .top-nav {
            display: flex;
            justify-content: space-around;
            padding: 25px 0 10px 0;
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        .tab-btn {
            color: var(--dim);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            padding-bottom: 8px;
            border: none;
            background: none;
            letter-spacing: 1px;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom: 3px solid var(--accent);
        }

        .page-label {
            text-align: center;
            color: var(--dim);
            font-size: 11px;
            letter-spacing: 4px;
            margin: 25px 0;
            text-transform: uppercase;
        }

        .muscle-header {
            color: var(--accent);
            padding: 0 25px;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .container { padding: 0 20px 140px 20px; max-width: 500px; margin: auto; }

        /* Exercise Card */
        .card {
            background: var(--surface);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .ex-name { font-size: 17px; margin-bottom: 20px; font-weight: 500; }

        .set-row { 
            display: flex; 
            align-items: center; 
            margin-bottom: 12px;
            gap: 15px;
        }

        .set-num { color: var(--dim); font-size: 10px; font-weight: 800; width: 45px; text-transform: uppercase; }

        input {
            background: var(--input-bg);
            border: 1px solid #333345;
            color: var(--text);
            padding: 14px;
            border-radius: 12px;
            flex: 1;
            text-align: center;
            font-size: 15px;
            outline: none;
        }

        input::placeholder { color: var(--dim); opacity: 0.5; }

        .add-set-link {
            color: var(--purple);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 15px;
            display: inline-block;
            cursor: pointer;
            text-decoration: none;
        }

        /* Finish Button Pinned to Bottom */
        .btn-finish {
            position: fixed;
            bottom: 35px;
            left: 25px;
            right: 25px;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 16px;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 24px rgba(0, 245, 212, 0.25);
            z-index: 3000;
        }

        .hidden { display: none; }
        .chart-wrapper { background: var(--surface); border-radius: 24px; padding: 20px; }
        .del-x { color: var(--dim); float: right; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="tab-btn active" id="btn-log" onclick="navTo('log')">Log</button>
        <button class="tab-btn" id="btn-stats" onclick="navTo('stats')">Analytics</button>
        <button class="tab-btn" id="btn-history" onclick="navTo('history')">History</button>
        <button class="tab-btn" id="btn-edit" onclick="navTo('edit')">Routine</button>
    </div>

    <div class="page-label" id="page-indicator">LOG</div>

    <div id="log-page" class="container">
        <div class="muscle-header" id="current-workout-name"></div>
        <div id="log-list"></div>
        <button class="btn-finish" onclick="saveSession()">FINISH SESSION</button>
    </div>

    <div id="stats-page" class="container hidden">
        <div class="chart-wrapper">
            <div style="color: var(--dim); font-size: 10px; font-weight: 800; margin-bottom: 20px;">MONTHLY VOLUME</div>
            <canvas id="volChart" height="280"></canvas>
        </div>
    </div>

    <div id="history-page" class="container hidden">
        <div id="history-data"></div>
    </div>

    <div id="edit-page" class="container hidden">
        <div id="routine-editor"></div>
    </div>

<script>
    const baseRoutine = {
        1: { name: "Chest & Triceps", ex: ["Bench Press", "Incline Press", "Pec Flys", "Pushdowns"] },
        2: { name: "Back & Biceps", ex: ["Lat Pulldowns", "Rows", "Curls"] },
        3: { name: "Legs", ex: ["Squats", "Leg Press", "Leg Curls"] },
        4: { name: "Back & Chest", ex: ["Deadlifts", "Bench Press", "Rows"] },
        5: { name: "Shoulders", ex: ["OHP", "Side Raises", "Facepulls"] },
        6: { name: "Legs", ex: ["Squats", "Leg Press", "Leg Curls"] },
        0: { name: "Rest Day", ex: [] }
    };

    let userSplit = JSON.parse(localStorage.getItem('lift_routine')) || baseRoutine;
    let userLogs = JSON.parse(localStorage.getItem('lift_logs')) || [];

    function navTo(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id + '-page').classList.remove('hidden');
        document.getElementById('btn-' + id).classList.add('active');
        document.getElementById('page-indicator').innerText = id.toUpperCase();
        
        if(id === 'log') renderLog();
        if(id === 'history') renderHistory();
        if(id === 'edit') renderEditor();
        if(id === 'stats') renderStats();
    }

    function renderLog() {
        const day = new Date().getDay();
        const workout = userSplit[day];
        document.getElementById('current-workout-name').innerText = workout.name;
        
        let html = '';
        workout.ex.forEach((name, exIdx) => {
            html += `<div class="card">
                <div class="ex-name">${name}</div>
                <div id="sets-for-${exIdx}">
                    ${createSets(exIdx, 3)} 
                </div>
                <div class="add-set-link" onclick="injectSetRow(${exIdx})">+ ADD SET</div>
            </div>`;
        });
        document.getElementById('log-list').innerHTML = html || '<div class="card">Enjoy your rest day!</div>';
    }

    // This function creates the 3 sets by default
    function createSets(exIdx, num) {
        let code = '';
        for(let s=1; s<=num; s++) {
            code += `<div class="set-row">
                <span class="set-num">SET ${s}</span>
                <input type="number" class="w-${exIdx}-${s}" placeholder="kg">
                <input type="number" class="r-${exIdx}-${s}" placeholder="reps">
            </div>`;
        }
        return code;
    }

    function injectSetRow(exIdx) {
        const parent = document.getElementById(`sets-for-${exIdx}`);
        const setNum = parent.children.length + 1;
        const div = document.createElement('div');
        div.className = 'set-row';
        div.innerHTML = `<span class="set-num">SET ${setNum}</span>
                        <input type="number" class="w-${exIdx}-${setNum}" placeholder="kg">
                        <input type="number" class="r-${exIdx}-${setNum}" placeholder="reps">`;
        parent.appendChild(div);
    }

    function saveSession() {
        const day = new Date().getDay();
        const workout = userSplit[day];
        const entry = { id: Date.now(), date: new Date().toISOString(), muscle: workout.name, exercises: [] };

        workout.ex.forEach((name, exIdx) => {
            let sets = [];
            const rowCount = document.getElementById(`sets-for-${exIdx}`).children.length;
            for(let s=1; s<=rowCount; s++) {
                const w = document.querySelector(`.w-${exIdx}-${s}`).value;
                const r = document.querySelector(`.r-${exIdx}-${s}`).value;
                if(w && r) sets.push({w, r});
            }
            if(sets.length) entry.exercises.push({name, sets});
        });

        if(entry.exercises.length) {
            userLogs.unshift(entry);
            localStorage.setItem('lift_logs', JSON.stringify(userLogs));
            alert("Session Saved!");
            navTo('history');
        } else {
            alert("Please enter weights/reps first.");
        }
    }

    function renderHistory() {
        let html = '';
        userLogs.forEach(log => {
            const date = new Date(log.date).toLocaleDateString('en-GB', {day:'2-digit', month:'short'});
            html += `<div class="card">
                <span class="del-x" onclick="removeLog(${log.id})">DELETE</span>
                <div style="color:var(--accent); font-size:11px; font-weight:700; margin-bottom:4px">${date}</div>
                <div style="font-weight:700; font-size:15px; margin-bottom:12px">${log.muscle}</div>
                ${log.exercises.map(ex => `
                    <div style="margin-top:10px; font-size:13px; border-left: 2px solid var(--purple); padding-left:12px">
                        <strong>${ex.name}</strong><br>
                        <span style="color:var(--dim)">${ex.sets.map(s => `${s.w}kg x ${s.r}`).join(' • ')}</span>
                    </div>
                `).join('')}
            </div>`;
        });
        document.getElementById('history-data').innerHTML = html || '<div class="card">No workouts logged.</div>';
    }

    function removeLog(id) {
        if(confirm("Permanently delete?")) {
            userLogs = userLogs.filter(l => l.id !== id);
            localStorage.setItem('lift_logs', JSON.stringify(userLogs));
            renderHistory();
        }
    }

    function renderStats() {
        const now = new Date();
        const currentMonthData = userLogs.filter(l => {
            const d = new Date(l.date);
            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }).reverse();

        const ctx = document.getElementById('volChart').getContext('2d');
        if(window.mainChart) window.mainChart.destroy();

        const grad = ctx.createLinearGradient(0, 0, 0, 300);
        grad.addColorStop(0, 'rgba(0, 245, 212, 0.2)');
        grad.addColorStop(1, 'rgba(0, 0, 0, 0)');

        window.mainChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: currentMonthData.map(l => new Date(l.date).getDate()),
                datasets: [{
                    data: currentMonthData.map(l => l.exercises.reduce((a,b) => a + b.sets.reduce((x,y) => x + (y.w*y.r),0),0)),
                    borderColor: '#00f5d4',
                    borderWidth: 3,
                    fill: true,
                    backgroundColor: grad,
                    tension: 0.4,
                    pointRadius: 3,
                    pointBackgroundColor: '#00f5d4'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#6b7280', font: {size: 10} } },
                    y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { display: false } }
                }
            }
        });
    }

    function renderEditor() {
        const week = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        let html = '';
        for(let i=0; i<7; i++) {
            html += `<div class="card">
                <div style="color:var(--dim); font-size:10px; font-weight:800; text-transform:uppercase; margin-bottom:8px">${week[i]}</div>
                <input style="width:100%; text-align:left; margin-bottom:15px; box-sizing:border-box" value="${userSplit[i].name}" onchange="editSplitName(${i}, this.value)">
                <div id="edit-box-${i}">
                    ${userSplit[i].ex.map((ex, idx) => `
                        <div style="display:flex; margin-bottom:10px; gap:10px">
                            <input style="flex:1; text-align:left" value="${ex}" onchange="editExName(${i}, ${idx}, this.value)">
                            <button onclick="killEx(${i}, ${idx})" style="border:none; background:none; color:#ff4757; font-weight:bold">✕</button>
                        </div>
                    `).join('')}
                </div>
                <div class="add-set-link" onclick="addExToSplit(${i})">+ Add Movement</div>
            </div>`;
        }
        document.getElementById('routine-editor').innerHTML = html;
    }

    function editSplitName(d, v) { userSplit[d].name = v; saveSplit(); }
    function editExName(d, i, v) { userSplit[d].ex[i] = v; saveSplit(); }
    function addExToSplit(d) { userSplit[d].ex.push("New Exercise"); renderEditor(); saveSplit(); }
    function killEx(d, i) { userSplit[d].ex.splice(i, 1); renderEditor(); saveSplit(); }
    function saveSplit() { localStorage.setItem('lift_routine', JSON.stringify(userSplit)); }

    navTo('log');
</script>
</body>
</html>
