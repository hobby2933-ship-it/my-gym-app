<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProLift Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d0d12;
            --surface: #1c1c28;
            --accent: #00f5d4;
            --purple: #9b5de5;
            --text: #ffffff;
            --dim: #6b7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* Top Nav Styling from your Screenshot */
        .top-nav {
            display: flex;
            justify-content: space-around;
            padding: 20px 0 10px 0;
            background: var(--bg);
        }

        .tab-btn {
            color: var(--dim);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            padding-bottom: 8px;
            border: none;
            background: none;
            letter-spacing: 1px;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom: 3px solid var(--accent);
        }

        .page-title {
            text-align: center;
            color: var(--dim);
            font-size: 12px;
            letter-spacing: 3px;
            margin: 20px 0;
            text-transform: uppercase;
        }

        .workout-category {
            color: var(--accent);
            padding: 0 20px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .container { padding: 0 20px 100px 20px; max-width: 500px; margin: auto; }

        /* Card Styling from Screenshot */
        .card {
            background: var(--surface);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .ex-title { font-size: 16px; margin-bottom: 20px; font-weight: 500; }

        .set-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 15px; 
        }

        .set-label { color: var(--dim); font-size: 10px; font-weight: bold; width: 40px; }

        input {
            background: #2a2a3a;
            border: 1px solid #3f3f50;
            color: var(--text);
            padding: 15px;
            border-radius: 12px;
            width: 80px;
            text-align: center;
            font-size: 14px;
        }

        .add-set-btn {
            background: none;
            border: none;
            color: var(--purple);
            font-size: 12px;
            font-weight: bold;
            padding: 10px 0;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Finish Button Styling from Screenshot */
        .btn-finish {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0, 245, 212, 0.2);
            z-index: 1000;
        }

        .hidden { display: none; }
        .del-history { color: #ff4757; font-size: 10px; float: right; cursor: pointer; }
        .chart-card { background: var(--surface); border-radius: 20px; padding: 20px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="tab-btn active" id="btn-log" onclick="openTab('log')">Log</button>
        <button class="tab-btn" id="btn-stats" onclick="openTab('stats')">Analytics</button>
        <button class="tab-btn" id="btn-history" onclick="openTab('history')">History</button>
        <button class="tab-btn" id="btn-edit" onclick="openTab('edit')">Routine</button>
    </div>

    <div class="page-title" id="page-label">LOG</div>

    <div id="log-page" class="container">
        <div class="workout-category" id="today-muscle"></div>
        <div id="exercise-list"></div>
        <button class="btn-finish" onclick="saveSession()">FINISH SESSION</button>
    </div>

    <div id="stats-page" class="container hidden">
        <div class="chart-card">
            <div style="color: var(--dim); font-size: 11px; margin-bottom: 15px;">MONTHLY PERFORMANCE</div>
            <canvas id="volChart" height="250"></canvas>
        </div>
    </div>

    <div id="history-page" class="container hidden">
        <div id="history-content"></div>
    </div>

    <div id="edit-page" class="container hidden">
        <div id="routine-editor"></div>
    </div>

<script>
    const defaultSplit = {
        1: { name: "Chest & Triceps", ex: ["Bench Press", "Incline Press", "Pec Flys", "Pushdowns"] },
        2: { name: "Back & Biceps", ex: ["Lat Pulldowns", "Rows", "Curls"] },
        3: { name: "Legs", ex: ["Squats", "Leg Press", "Leg Curls"] },
        4: { name: "Back & Chest", ex: ["Deadlifts", "Bench Press", "Rows"] },
        5: { name: "Shoulders", ex: ["OHP", "Side Raises", "Facepulls"] },
        6: { name: "Legs", ex: ["Squats", "Leg Press", "Leg Curls"] },
        0: { name: "Rest Day", ex: [] }
    };

    let routine = JSON.parse(localStorage.getItem('routine_v4')) || defaultSplit;
    let logs = JSON.parse(localStorage.getItem('logs_v4')) || [];

    function openTab(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id + '-page').classList.remove('hidden');
        document.getElementById('btn-' + id).classList.add('active');
        document.getElementById('page-label').innerText = id.toUpperCase();
        
        if(id === 'log') renderLog();
        if(id === 'history') renderHistory();
        if(id === 'edit') renderEditor();
        if(id === 'stats') renderStats();
    }

    function renderLog() {
        const day = new Date().getDay();
        const workout = routine[day];
        document.getElementById('today-muscle').innerText = workout.name;
        
        let html = '';
        workout.ex.forEach((name, exIdx) => {
            html += `<div class="card">
                <div class="ex-title">${name}</div>
                <div id="sets-container-${exIdx}">
                    ${generateSetRows(exIdx, 3)} 
                </div>
                <button class="add-set-btn" onclick="addNewSet(${exIdx})">+ Add Set</button>
            </div>`;
        });
        document.getElementById('exercise-list').innerHTML = html || 'RECOVERY DAY';
    }

    // Function to generate the HTML for sets (starts at 3)
    function generateSetRows(exIdx, count) {
        let rows = '';
        for(let s=1; s<=count; s++) {
            rows += `<div class="set-row">
                <span class="set-label">SET ${s}</span>
                <input type="number" class="w-${exIdx}-${s}" placeholder="kg">
                <input type="number" class="r-${exIdx}-${s}" placeholder="reps">
            </div>`;
        }
        return rows;
    }

    function addNewSet(exIdx) {
        const container = document.getElementById(`sets-container-${exIdx}`);
        const nextSet = container.children.length + 1;
        const div = document.createElement('div');
        div.className = 'set-row';
        div.innerHTML = `<span class="set-label">SET ${nextSet}</span>
                        <input type="number" class="w-${exIdx}-${nextSet}" placeholder="kg">
                        <input type="number" class="r-${exIdx}-${nextSet}" placeholder="reps">`;
        container.appendChild(div);
    }

    function saveSession() {
        const day = new Date().getDay();
        const workout = routine[day];
        const session = { id: Date.now(), date: new Date().toISOString(), muscle: workout.name, data: [] };

        workout.ex.forEach((name, exIdx) => {
            let sets = [];
            const count = document.getElementById(`sets-container-${exIdx}`).children.length;
            for(let s=1; s<=count; s++) {
                const w = document.querySelector(`.w-${exIdx}-${s}`).value;
                const r = document.querySelector(`.r-${exIdx}-${s}`).value;
                if(w && r) sets.push({w, r});
            }
            if(sets.length) session.data.push({name, sets});
        });

        if(session.data.length) {
            logs.unshift(session);
            localStorage.setItem('logs_v4', JSON.stringify(logs));
            alert("Workout Complete!");
            openTab('history');
        }
    }

    function renderHistory() {
        let html = '';
        logs.forEach(l => {
            const d = new Date(l.date).toLocaleDateString();
            html += `<div class="card">
                <span class="del-history" onclick="deleteHistory(${l.id})">DELETE</span>
                <div style="color:var(--accent); font-size:12px; margin-bottom:5px">${d}</div>
                <div style="font-weight:bold; margin-bottom:10px">${l.muscle}</div>
                ${l.data.map(ex => `
                    <div style="margin-top:10px; font-size:13px; border-left: 2px solid var(--purple); padding-left:10px">
                        <strong>${ex.name}</strong><br>
                        ${ex.sets.map(s => `${s.w}kg x ${s.r}`).join(' | ')}
                    </div>
                `).join('')}
            </div>`;
        });
        document.getElementById('history-content').innerHTML = html || 'No data yet.';
    }

    function deleteHistory(id) {
        if(confirm("Delete this log?")) {
            logs = logs.filter(l => l.id !== id);
            localStorage.setItem('logs_v4', JSON.stringify(logs));
            renderHistory();
        }
    }

    function renderStats() {
        const now = new Date();
        const monthLogs = logs.filter(l => {
            const d = new Date(l.date);
            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }).reverse();

        const ctx = document.getElementById('volChart').getContext('2d');
        if(window.mainChart) window.mainChart.destroy();

        const gradient = ctx.createLinearGradient(0, 0, 0, 300);
        gradient.addColorStop(0, 'rgba(0, 245, 212, 0.3)');
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

        window.mainChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: monthLogs.map(l => new Date(l.date).getDate()),
                datasets: [{
                    data: monthLogs.map(l => l.data.reduce((a,b) => a + b.sets.reduce((x,y) => x + (y.w*y.r),0),0)),
                    borderColor: '#00f5d4',
                    borderWidth: 3,
                    fill: true,
                    backgroundColor: gradient,
                    tension: 0.4,
                    pointRadius: 4,
                    pointBackgroundColor: '#00f5d4'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#6b7280' } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { display: false } }
                }
            }
        });
    }

    function renderEditor() {
        const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        let html = '';
        for(let i=0; i<7; i++) {
            html += `<div class="card">
                <div style="color:var(--dim); font-size:10px; margin-bottom:5px">${days[i]}</div>
                <input style="width:100%; text-align:left; margin-bottom:15px; box-sizing:border-box" value="${routine[i].name}" onchange="updateRoutineName(${i}, this.value)">
                <div id="edit-ex-box-${i}">
                    ${routine[i].ex.map((ex, exIdx) => `
                        <div style="display:flex; margin-bottom:10px">
                            <input style="flex:1; text-align:left" value="${ex}" onchange="updateExName(${i}, ${exIdx}, this.value)">
                            <button onclick="removeEx(${i}, ${exIdx})" style="border:none; background:none; color:red; padding-left:10px">✕</button>
                        </div>
                    `).join('')}
                </div>
                <button class="add-set-btn" onclick="addExRow(${i})">+ Add Movement</button>
            </div>`;
        }
        document.getElementById('routine-editor').innerHTML = html;
    }

    function updateRoutineName(d, v) { routine[d].name = v; saveR(); }
    function updateExName(d, i, v) { routine[d].ex[i] = v; saveR(); }
    function addExRow(d) { routine[d].ex.push("New Exercise"); renderEditor(); saveR(); }
    function removeEx(d, i) { routine[d].ex.splice(i, 1); renderEditor(); saveR(); }
    function saveR() { localStorage.setItem('routine_v4', JSON.stringify(routine)); }

    openTab('log');
</script>
</body>
</html>
